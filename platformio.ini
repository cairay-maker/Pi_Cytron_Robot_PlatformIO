[env:cytron_motion_2350_pro]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = cytron_motion_2350_pro
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes
; monitor_port = /dev/ttyACM1 ; somethime it can be /dev/ttyACM0, check with `pio device list`
lib_deps =
  Adafruit BNO08x
  Adafruit BusIO
  Adafruit Unified Sensor
  STM32duino VL53L4CX
  Adafruit NeoPixel @ ^1.12.0

; --- Notes ---
; I2C Wiring (STEMMA QT — blue=SDA, yellow=SCL):
;   ToF  VL53L4CX → Wire  (GP16=SDA, GP17=SCL) address 0x29
;   IMU  BNO085   → Wire1 (GP26=SDA, GP27=SCL) address 0x4A
;
; UART Wiring (Raspberry Pi Interface):
;   RPi TX (Pin 8 / GPIO 14)  → Cytron RX (GP5 - UART1 RX)
;   RPi RX (Pin 10 / GPIO 15) → Cytron TX (GP4 - UART1 TX)
;   RPi GND (Pin 6)           → Cytron GND
;
; Buttons & LEDs:
;   GP20 = Start Button
;   GP21 = Stop Button
;   GP0  = Heartbeat LED
;   GP18 = XSHUT (VL53L4CX hard reset)
;   GP23 = NeoPixels (Robot_Status)
;
; Servos (Camera & Ball Handler):
;   GP1 = Camera Pan
;   GP2 = Camera Tilt
;   GP4 = Gripper Arm
;   GP5 = Gripper Claw
;
; Motors:
;   FL: GP14(+) GP15(-)
;   FR: GP13(+) GP12(-)
;   RL: GP10(+) GP11(-)
;   RR: GP8(+)  GP9(-)
;
; Upload: BOOT+RESET to enter bootloader, then:
;   cp .pio/build/cytron_motion_2350_pro/firmware.uf2 /media/raycai/RP2350/firmware.uf2
